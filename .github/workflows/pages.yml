# TEMPLATE — copy this into the Playtolia/unity-sdk repo at:
#   .github/workflows/pages.yml
# It is NOT a workflow in this (SDK) repo; it lives under .github/templates/ only as the
# version-controlled source. See RELEASING.md ▸ "Static UPM registry".
#
# What it does: deploys the `gh-pages` data store (which the SDK release workflow pushes to)
# to GitHub Pages using the Actions artifact path — serving files verbatim, with NO Jekyll
# legacy build (that build fails on the registry's dotted/dashed paths). Requires the repo's
# Pages source to be set to "GitHub Actions" (Settings ▸ Pages ▸ Source).
name: Deploy UPM registry to Pages

on:
  push:
    branches: [gh-pages]   # the SDK release pushes the registry here → this deploys it
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let the latest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .          # gh-pages content: CNAME + .nojekyll + unity-sdk/… served verbatim
      - id: deployment
        uses: actions/deploy-pages@v4
